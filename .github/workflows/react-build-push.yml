name: CI/CD React + Docker (Enterprise)

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🔧 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 📦 Install deps
        run: npm ci

      - name: 🏗 Build app
        run: npm run build

      - name: 📂 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/

  docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 📂 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist/

      # 🔥 Setup Docker Buildx (IMPORTANT)
      - name: ⚙️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔐 Login
      - name: 🔑 Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🏷 Metadata (tags auto)
      - name: 🏷 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/renthub-frontend
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest

      # 🚀 Build + Push optimisé
      - name: 🐳 Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/renthub-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/renthub-frontend:buildcache,mode=max
